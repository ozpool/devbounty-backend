name: Bug
description: Something is broken or behaving incorrectly
labels: ['type:fix']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's wrong? What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] bug no longer reproduces
        - [ ] regression test added
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: 'commit sha, network, node version'
