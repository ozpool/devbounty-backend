name: Chore
description: Tooling, deps, config, or infra work
labels: ['type:chore']
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What needs doing and why?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: deps
    attributes:
      label: Dependencies
      placeholder: 'Depends on #N · Blocks #M'
