name: CI

on:
  pull_request:
  push:
    branches: [main]

# Read-only token: CI only builds and tests, it never writes to the repo.
permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm -w @devbounty/api run lint
      - run: npm -w @devbounty/api run typecheck
      # vitest spins up its own in-memory MongoDB, so no service container is needed.
      - run: npm -w @devbounty/api run test
      - run: npm -w @devbounty/api run build

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm -w @devbounty/contracts run compile
      - run: npm -w @devbounty/contracts run test

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Bind the PR base ref to an env var so the shell treats it as data, never
      # as code (a crafted branch name must not be able to inject a command).
      - name: commitlint
        env:
          BASE_REF: ${{ github.base_ref }}
        run: npx commitlint --from "origin/${BASE_REF}" --to HEAD
